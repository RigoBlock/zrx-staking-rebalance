[profile.default]
src = "src"
out = "out"
script = "script"
test = "test"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
ffi = true
fs_permissions = [
    { access = "read-write", path = "proposals" },
    { access = "read-write", path = "broadcast" },
]

[fmt]
line_length = 100
