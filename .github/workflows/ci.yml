name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry dependencies
        run: ./sh/install-foundry-deps.sh

      - name: Build
        run: forge build

      - name: Lint
        run: forge lint

      - name: Run Foundry tests
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
        run: |
          if [ -z "$RPC_URL" ]; then
            echo "RPC_URL secret is not set; skipping fork tests."
            exit 0
          fi
          forge test
