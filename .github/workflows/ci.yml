name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    env:
      FORK_BLOCK: 25400000
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry dependencies
        run: ./sh/install-foundry-deps.sh

      - name: Build
        run: forge build

      - name: Lint
        run: forge lint

      # Cache the forked RPC state so each PR only fetches the pinned block once.
      # The key includes the pinned block number; bump FORK_BLOCK above to invalidate.
      - name: Cache Foundry fork state
        uses: actions/cache@v4
        with:
          path: ~/.foundry/cache/rpc
          key: foundry-rpc-${{ runner.os }}-${{ env.FORK_BLOCK }}

      - name: Run Foundry tests
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          FOUNDRY_FORK_BLOCK_NUMBER: ${{ env.FORK_BLOCK }}
        run: |
          if [ -z "$RPC_URL" ]; then
            echo "RPC_URL secret is not set; skipping fork tests."
            exit 0
          fi
          forge test
